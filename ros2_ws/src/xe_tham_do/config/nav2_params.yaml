amcl:
  ros__parameters:
    # Sử dụng thời gian mô phỏng (True nếu chạy trong Gazebo/sim)
    use_sim_time: True
    # Tham số noise mô hình chuyển động theo hướng (alpha1)
    alpha1: 0.2
    # Tham số noise mô hình chuyển động theo phương ngang (alpha2)
    alpha2: 0.2
    # Tham số noise mô hình chuyển động theo vận tốc (alpha3)
    alpha3: 0.2
    # Tham số noise mô hình chuyển động theo góc quay (alpha4)
    alpha4: 0.2
    # Tham số noise bổ sung (alpha5)
    alpha5: 0.2
    # Tên frame gốc của robot
    base_frame_id: "base_footprint"
    # Khoảng cách tối đa để bỏ qua tia laser khi beamskip (m)
    beam_skip_distance: 0.5
    # Ngưỡng lỗi khi beamskip
    beam_skip_error_threshold: 0.9
    # Ngưỡng tỉ lệ chùm tia bị bỏ qua khi beamskip
    beam_skip_threshold: 0.3
    # Bật/tắt chức năng beamskip (bỏ qua chùm tia laser không tốt)
    do_beamskip: false
    # Tên frame bản đồ toàn cục
    global_frame_id: "map"
    # Hệ số lambda cho phân phối short trong sensor model
    lambda_short: 0.1
    # Khoảng cách tối đa để tính likelihood laser (m)
    laser_likelihood_max_dist: 2.0
    # Khoảng cách lớn nhất cảm biến laser (m)
    laser_max_range: 100.0
    # Khoảng cách nhỏ nhất cảm biến laser (m)
    laser_min_range: -1.0
    # Loại mô hình cảm biến laser
    laser_model_type: "likelihood_field"
    # Số lượng tia laser tối đa sử dụng
    max_beams: 60
    # Số lượng hạt tối đa trong AMCL
    max_particles: 2000
    # Số lượng hạt tối thiểu trong AMCL
    min_particles: 500
    # Tên frame odometry
    odom_frame_id: "odom"
    # Sai số vị trí cho phép của particle filter
    pf_err: 0.05
    # Xác suất cập nhật particle filter
    pf_z: 0.99
    # Tham số phục hồi cho thuật toán alpha fast
    recovery_alpha_fast: 0.0
    # Tham số phục hồi cho thuật toán alpha slow
    recovery_alpha_slow: 0.0
    # Khoảng thời gian giữa các lần resample particles
    resample_interval: 1
    # Loại mô hình robot (differential: 2 bánh chủ động)
    robot_model_type: "differential"
    # Tần suất lưu trạng thái pose (Hz)
    save_pose_rate: 0.5
    # Độ lệch chuẩn của Gaussian khi hit model
    sigma_hit: 0.2
    # Bật/tắt xuất bản transform bản đồ
    tf_broadcast: true
    # Thời gian chịu lỗi khi biến đổi transform (s)
    transform_tolerance: 1.0
    # Góc quay tối thiểu để cập nhật AMCL (rad)
    update_min_a: 0.2
    # Quãng đường di chuyển tối thiểu để cập nhật AMCL (m)
    update_min_d: 0.25
    # Trọng số cho xác suất laser trùng khớp (hit)
    z_hit: 0.5
    # Trọng số cho xác suất laser ở xa nhất (max)
    z_max: 0.05
    # Trọng số cho xác suất laser ngẫu nhiên (rand)
    z_rand: 0.5
    # Trọng số cho xác suất laser ngắn hơn dự đoán (short)
    z_short: 0.05
    # Tên topic laser scan
    scan_topic: scan

amcl_map_client:
  ros__parameters:
    # Sử dụng thời gian mô phỏng
    use_sim_time: True

amcl_rclcpp_node:
  ros__parameters:
    # Sử dụng thời gian mô phỏng
    use_sim_time: True

bt_navigator:
  ros__parameters:
    # Sử dụng thời gian mô phỏng
    use_sim_time: True
    # Frame bản đồ toàn cục
    global_frame: map
    # Frame gốc robot
    robot_base_frame: base_link
    # Tên topic odometry
    odom_topic: /odom
    # Bật giám sát Groot (công cụ đồ họa Behavior Tree)
    enable_groot_monitoring: True
    # Cổng publisher ZMQ cho Groot
    groot_zmq_publisher_port: 1666
    # Cổng server ZMQ cho Groot
    groot_zmq_server_port: 1667
    # File Behavior Tree mặc định
    default_bt_xml_filename: "navigate_w_replanning_and_recovery.xml"
    # Danh sách các plugin Behavior Tree sử dụng
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node

bt_navigator_rclcpp_node:
  ros__parameters:
    # Sử dụng thời gian mô phỏng
    use_sim_time: True

controller_server:
  ros__parameters:
    # Sử dụng thời gian mô phỏng
    use_sim_time: True
    # Tần số điều khiển (Hz)
    controller_frequency: 20.0
    # Ngưỡng vận tốc X nhỏ nhất (m/s)
    min_x_velocity_threshold: 0.001
    # Ngưỡng vận tốc Y nhỏ nhất (m/s)
    min_y_velocity_threshold: 0.5
    # Ngưỡng vận tốc quay nhỏ nhất (rad/s)
    min_theta_velocity_threshold: 0.001
    # Tên plugin kiểm tra tiến triển
    progress_checker_plugin: "progress_checker"
    # Tên plugin kiểm tra mục tiêu
    goal_checker_plugin: "goal_checker"
    # Danh sách các plugin điều khiển
    controller_plugins: ["FollowPath"]

    # Tham số plugin kiểm tra tiến triển (progress_checker)
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # Bán kính di chuyển yêu cầu (m)
      required_movement_radius: 0.5
      # Thời gian cho phép không di chuyển (s)
      movement_time_allowance: 10.0
    # Tham số plugin kiểm tra mục tiêu (goal_checker)
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      # Ngưỡng sai lệch vị trí đạt mục tiêu (m)
      xy_goal_tolerance: 0.25
      # Ngưỡng sai lệch góc đạt mục tiêu (rad)
      yaw_goal_tolerance: 0.25
      # Bật/tắt trạng thái lưu (tối ưu)
      stateful: True
    # Tham số DWB local planner (FollowPath)
    FollowPath:
      plugin: "nav2_dwb_controller::DWBLocalPlanner"
      # Hiển thị chi tiết debug quỹ đạo
      debug_trajectory_details: True
      # Vận tốc X tối thiểu (m/s)
      min_vel_x: 0.0
      # Vận tốc Y tối thiểu (m/s)
      min_vel_y: 0.0
      # Vận tốc X tối đa (m/s)
      max_vel_x: 0.26
      # Vận tốc Y tối đa (m/s)
      max_vel_y: 0.0
      # Vận tốc quay tối đa (rad/s)
      max_vel_theta: 1.0
      # Tốc độ XY tối thiểu (m/s)
      min_speed_xy: 0.0
      # Tốc độ XY tối đa (m/s)
      max_speed_xy: 0.26
      # Tốc độ quay tối thiểu (rad/s)
      min_speed_theta: 0.0
      # Giới hạn gia tốc X (m/s^2)
      acc_lim_x: 2.5
      # Giới hạn gia tốc Y (m/s^2)
      acc_lim_y: 0.0
      # Giới hạn gia tốc quay (rad/s^2)
      acc_lim_theta: 3.2
      # Giới hạn giảm tốc X (m/s^2)
      decel_lim_x: -2.5
      # Giới hạn giảm tốc Y (m/s^2)
      decel_lim_y: 0.0
      # Giới hạn giảm tốc quay (rad/s^2)
      decel_lim_theta: -3.2
      # Số lượng mẫu vận tốc X
      vx_samples: 20
      # Số lượng mẫu vận tốc Y
      vy_samples: 5
      # Số lượng mẫu vận tốc quay
      vtheta_samples: 20
      # Thời gian mô phỏng quỹ đạo (s)
      sim_time: 1.7
      # Độ phân giải mô phỏng quỹ đạo tuyến tính (m)
      linear_granularity: 0.05
      # Độ phân giải mô phỏng góc (rad)
      angular_granularity: 0.025
      # Thời gian chịu lỗi khi biến đổi transform (s)
      transform_tolerance: 0.2
      # Ngưỡng đạt mục tiêu XY (m)
      xy_goal_tolerance: 0.25
      # Ngưỡng vận tốc để xác định robot dừng lại (m/s)
      trans_stopped_velocity: 0.25
      # Cho phép bỏ qua sớm đánh giá quỹ đạo không hợp lệ
      short_circuit_trajectory_evaluation: True
      # Bật/tắt trạng thái lưu (tối ưu)
      stateful: True
      # Danh sách các chỉ trích (critics) cho đánh giá quỹ đạo
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      # Tham số critic BaseObstacle
      BaseObstacle.scale: 0.02
      # Tham số critic PathAlign
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      # Tham số critic GoalAlign
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      # Tham số critic PathDist
      PathDist.scale: 32.0
      # Tham số critic GoalDist
      GoalDist.scale: 24.0
      # Tham số critic RotateToGoal
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

controller_server_rclcpp_node:
  ros__parameters:
    # Sử dụng thời gian mô phỏng
    use_sim_time: True

local_costmap:
  local_costmap:
    ros__parameters:
      # Tần số cập nhật costmap (Hz)
      update_frequency: 5.0
      # Tần số xuất bản costmap (Hz)
      publish_frequency: 2.0
      # Frame toàn cục của local costmap
      global_frame: odom
      # Frame gốc robot
      robot_base_frame: base_link
      # Sử dụng thời gian mô phỏng
      use_sim_time: True
      # Sử dụng cửa sổ cuốn cho costmap
      rolling_window: true
      # Chiều rộng costmap (m)
      width: 3
      # Chiều cao costmap (m)
      height: 3
      # Độ phân giải costmap (m)
      resolution: 0.05
      # Bán kính robot (m)
      robot_radius: 0.22
      # Danh sách plugin sử dụng cho costmap
      plugins: ["voxel_layer", "inflation_layer"]
      # Plugin inflation layer
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      # Plugin voxel layer
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
      # Plugin static layer
      static_layer:
        map_subscribe_transient_local: True
      # Luôn gửi toàn bộ bản đồ chi phí
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      # Sử dụng thời gian mô phỏng
      use_sim_time: True
  local_costmap_rclcpp_node:
    ros__parameters:
      # Sử dụng thời gian mô phỏng
      use_sim_time: True

global_costmap:
  global_costmap:
    ros__parameters:
      # Tần số cập nhật costmap toàn cục (Hz)
      update_frequency: 1.0
      # Tần số xuất bản costmap toàn cục (Hz)
      publish_frequency: 1.0
      # Frame toàn cục
      global_frame: map
      # Frame gốc robot
      robot_base_frame: base_link
      # Sử dụng thời gian mô phỏng
      use_sim_time: True
      # Bán kính robot (m)
      robot_radius: 0.22
      # Độ phân giải costmap (m)
      resolution: 0.05
      # Theo dõi không gian chưa biết
      track_unknown_space: true
      # Danh sách plugin costmap sử dụng
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      # Plugin obstacle layer
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
      # Plugin static layer
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      # Plugin inflation layer
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      # Luôn gửi toàn bộ bản đồ chi phí
      always_send_full_costmap: True
  global_costmap_client:
    ros__parameters:
      # Sử dụng thời gian mô phỏng
      use_sim_time: True
  global_costmap_rclcpp_node:
    ros__parameters:
      # Sử dụng thời gian mô phỏng
      use_sim_time: True

map_server:
  ros__parameters:
    # Sử dụng thời gian mô phỏng
    use_sim_time: True
    # Đường dẫn file bản đồ yaml

    yaml_filename: "/root/maps/my_map.yaml"

map_saver:
  ros__parameters:
    # Sử dụng thời gian mô phỏng
    use_sim_time: True
    # Thời gian timeout khi lưu bản đồ (ms)
    save_map_timeout: 5000
    # Ngưỡng xác định vùng free khi lưu bản đồ
    free_thresh_default: 0.25
    # Ngưỡng xác định vùng occupied khi lưu bản đồ
    occupied_thresh_default: 0.65
    # Bật/tắt chế độ subscribe bản đồ kiểu transient local
    map_subscribe_transient_local: False

planner_server:
  ros__parameters:
    # Tần số mong muốn của planner (Hz)
    expected_planner_frequency: 20.0
    # Sử dụng thời gian mô phỏng
    use_sim_time: True
    # Danh sách plugin planner sử dụng
    planner_plugins: ["GridBased"]
    # Cấu hình plugin GridBased
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      # Ngưỡng dung sai khi tìm đường (m)
      tolerance: 0.5
      # Sử dụng thuật toán A* (false: Dijkstra)
      use_astar: false
      # Cho phép đi vào vùng chưa biết
      allow_unknown: true

planner_server_rclcpp_node:
  ros__parameters:
    # Sử dụng thời gian mô phỏng
    use_sim_time: True

behavior_server:
  ros__parameters:
    # Tên topic costmap
    costmap_topic: local_costmap/costmap_raw
    # Tên topic footprint của robot
    footprint_topic: local_costmap/published_footprint
    # Tần số chu kỳ thực thi (Hz)
    cycle_frequency: 10.0
    # Danh sách plugin phục hồi sử dụng
    recovery_plugins: ["spin", "back_up", "wait"]
    # Cấu hình plugin spin
    spin:
      plugin: "nav2_behaviors/Spin"
    # Cấu hình plugin back_up
    back_up:
      plugin: "nav2_behaviors/BackUp"
    # Cấu hình plugin wait
    wait:
      plugin: "nav2_behaviors/Wait"
    # Frame toàn cục
    global_frame: odom
    # Frame gốc robot
    robot_base_frame: base_link
    # Thời gian timeout khi nhận transform (s)
    transform_timeout: 0.1
    # Sử dụng thời gian mô phỏng
    use_sim_time: true
    # Thời gian mô phỏng hành vi phía trước (s)
    simulate_ahead_time: 2.0
    # Vận tốc quay tối đa (rad/s)
    max_rotational_vel: 1.0
    # Vận tốc quay tối thiểu (rad/s)
    min_rotational_vel: 0.4
    # Giới hạn gia tốc quay (rad/s^2)
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    # Sử dụng thời gian mô phỏng
    use_sim_time: True