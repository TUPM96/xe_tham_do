slam_toolbox:
  ros__parameters:

    # Plugin params
    # Bộ giải tối ưu sử dụng (CeresSolver của thư viện solver_plugins)
    solver_plugin: solver_plugins::CeresSolver
    # Phương pháp giải tuyến tính sử dụng trong Ceres
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    # Bộ tiền xử lý (preconditioner) cho Ceres
    ceres_preconditioner: SCHUR_JACOBI
    # Chiến lược tin cậy (trust strategy) cho Ceres
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    # Loại Dogleg cho thuật toán tối ưu hóa
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    # Hàm mất mát sử dụng trong tối ưu hóa (None: không dùng)
    ceres_loss_function: None

    # ROS Parameters
    # Tên frame của odometry
    odom_frame: odom
    # Tên frame của bản đồ
    map_frame: map
    # Tên frame gốc của robot
    base_frame: base_footprint
    # Topic nhận dữ liệu laser scan
    scan_topic: /scan
    # Chế độ hoạt động: mapping (tạo bản đồ)
    mode: mapping

    # Nếu muốn tiếp tục tạo bản đồ tại một tọa độ hoặc tại vị trí dock (không dùng đồng thời)
    # Đường dẫn file bản đồ lưu/đọc khi tiếp tục
    map_file_name: /home/dev/dev_ws/my_map_serial
    # # Tọa độ bắt đầu bản đồ: [x, y, theta]
    # map_start_pose: [0.0, 0.0, 0.0]
    # Bắt đầu bản đồ tại vị trí dock (nếu true)
    map_start_at_dock: true

    # Bật/tắt ghi log debug
    debug_logging: false
    # Giới hạn số lượng scan đưa vào xử lý (1: không giới hạn, >1: lấy mỗi n scan)
    throttle_scans: 1
    # Chu kỳ xuất bản transform (s): nếu = 0 sẽ không xuất odometry
    transform_publish_period: 0.02
    # Thời gian cập nhật bản đồ (s)
    map_update_interval: 4.0
    # Độ phân giải bản đồ (mỗi ô lưới)
    resolution: 0.05
    # Khoảng cách laser tối đa sử dụng (m) cho dựng ảnh raster
    max_laser_range: 10.0
    # Khoảng thời gian nhỏ nhất giữa các lần xử lý scan (s)
    minimum_time_interval: 0.2
    # Thời gian timeout khi nhận transform (s)
    transform_timeout: 0.2
    # Thời gian lưu buffer tf (s)
    tf_buffer_duration: 30.
    # Kích thước stack sử dụng khi serialize bản đồ lớn (byte)
    stack_size_to_use: 40000000
    # Bật chế độ tương tác (ví dụ: chỉnh sửa bản đồ trên giao diện)
    enable_interactive_mode: true

    # General Parameters
    # Sử dụng thuật toán scan matching
    use_scan_matching: true
    # Sử dụng barycenter của scan để cải thiện matching
    use_scan_barycenter: true
    # Khoảng cách robot phải di chuyển tối thiểu (m) mới update
    minimum_travel_distance: 0.2
    # Góc quay tối thiểu (rad) mới update
    minimum_travel_heading: 0.2
    # Số lượng scan lưu trong buffer
    scan_buffer_size: 5
    # Khoảng cách tối đa của scan lưu trong buffer (m)
    scan_buffer_maximum_scan_distance: 10.0
    # Ngưỡng phản hồi nhỏ nhất khi matching fine
    link_match_minimum_response_fine: 0.1
    # Khoảng cách tối đa giữa các scan khi matching (m)
    link_scan_maximum_distance: 1.5
    # Khoảng cách tối đa tìm kiếm vòng lặp (loop closing) (m)
    loop_search_maximum_distance: 3.0
    # Bật/tắt tính năng đóng vòng lặp (loop closing)
    do_loop_closing: true
    # Số lượng scan tối thiểu để nhận diện vòng lặp
    loop_match_minimum_chain_size: 10
    # Phương sai tối đa khi matching coarse
    loop_match_maximum_variance_coarse: 3.0
    # Ngưỡng phản hồi nhỏ nhất khi matching coarse
    loop_match_minimum_response_coarse: 0.35
    # Ngưỡng phản hồi nhỏ nhất khi matching fine
    loop_match_minimum_response_fine: 0.45

    # Correlation Parameters - Correlation Parameters
    # Kích thước không gian tìm kiếm tương quan (m)
    correlation_search_space_dimension: 0.5
    # Độ phân giải không gian tìm kiếm tương quan (m)
    correlation_search_space_resolution: 0.01
    # Độ lệch chuẩn smear trong tìm kiếm tương quan (m)
    correlation_search_space_smear_deviation: 0.1

    # Correlation Parameters - Loop Closure Parameters
    # Kích thước không gian tìm kiếm vòng lặp (m)
    loop_search_space_dimension: 8.0
    # Độ phân giải không gian tìm kiếm vòng lặp (m)
    loop_search_space_resolution: 0.05
    # Độ lệch chuẩn smear trong tìm kiếm vòng lặp (m)
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters
    # Trọng số phạt theo khoảng cách khi matching
    distance_variance_penalty: 0.5
    # Trọng số phạt theo góc khi matching
    angle_variance_penalty: 1.0

    # Góc offset cho tìm kiếm fine (rad)
    fine_search_angle_offset: 0.00349
    # Góc offset cho tìm kiếm coarse (rad)
    coarse_search_angle_offset: 0.349
    # Độ phân giải góc coarse (rad)
    coarse_angle_resolution: 0.0349
    # Ngưỡng phạt góc tối thiểu khi matching
    minimum_angle_penalty: 0.9
    # Ngưỡng phạt khoảng cách tối thiểu khi matching
    minimum_distance_penalty: 0.5
    # Bật mở rộng kết quả matching khi phản hồi tốt
    use_response_expansion: true