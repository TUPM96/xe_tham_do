version: '3.8'

services:
  ros2_humble:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ros2_humble_container
    volumes:
      - ./ros2_ws:/root/ros2_ws/src
      - ./logs:/root/ros2_ws/logs
      - ./install:/root/ros2_ws/install
      - ./build:/root/ros2_ws/build
      - $HOME/.Xauthority:/root/.Xauthority:ro
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=0
      - QT_X11_NO_MITSHM=1
    network_mode: host
    privileged: true
    devices:
      - /dev:/dev
    command: tail -f /dev/null