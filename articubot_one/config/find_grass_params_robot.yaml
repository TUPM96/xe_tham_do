detect_grass:
  ros__parameters:
    x_min: 0
    x_max: 100
    y_min: 42
    y_max: 100
    # Typical green in HSV: h ~ 35-85, s ~ 50-255, v ~ 50-255
    h_min: 35
    h_max: 85
    s_min: 50
    s_max: 255
    v_min: 50
    v_max: 255
    sz_min: 10
    sz_max: 1000

detect_grass_3d:
  ros__parameters:
    h_fov: 1.089
    grass_patch_radius: 0.1
    camera_frame: "camera_link_optical"

follow_grass:
  ros__parameters:
    rcv_timeout_secs: 1.0
    angular_chase_multiplier: 0.7
    forward_chase_speed: 0.1
    search_angular_speed: 0.5
    max_size_thresh: 0.5
    filter_value: 0.9